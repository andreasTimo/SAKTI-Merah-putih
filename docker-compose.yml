# The APP runs in Docker (identical on Windows & macOS).
# The fingerprint AGENT does NOT run here — USB passthrough into Docker Desktop's
# Linux VM is unsupported on Windows/macOS. Run the agent natively on the host
# (`npm run agent`); the container reaches it via host.docker.internal.

services:
  app:
    build: ./app
    container_name: sakti-app
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - AGENT_URL=http://host.docker.internal:7373
      - MATCHER_URL=http://matcher:8090
      # Real testing uses the native CS9711 agent on the operator host.
      - BIO_MODE=real
      - TARGET_AREAS=15
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - matcher
    restart: unless-stopped

  # CS9711 partial-print SIGFM matcher. Descriptor templates are persisted as
  # SQLite BLOBs; raw frames are never persisted.
  matcher:
    build: ./matcher
    container_name: sakti-matcher
    ports:
      - "8090:8090"
    environment:
      - MATCHER_PORT=8090
      - MATCH_THRESHOLD=40
      - TARGET_AREAS=15
      - TEMPLATE_DB_PATH=/data/sakti-sigfm.sqlite
    restart: unless-stopped
    volumes:
      - matcher-data:/data

volumes:
  matcher-data:
