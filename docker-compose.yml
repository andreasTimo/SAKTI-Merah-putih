# The APP runs in Docker (identical on Windows & macOS).
# The fingerprint AGENT does NOT run here — USB passthrough into Docker Desktop's
# Linux VM is unsupported on Windows/macOS. Run the agent natively on the host
# (`npm run agent`); the container reaches it via host.docker.internal.

services:
  app:
    build: ./app
    container_name: sakti-app
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - AGENT_URL=http://host.docker.internal:7373
      - MATCHER_URL=http://matcher:8090
      # mock = bangun/uji flow tanpa sensor; ganti ke 'real' untuk pakai CS9711.
      - BIO_MODE=mock
      - TARGET_AREAS=8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - matcher
    restart: unless-stopped

  # SourceAFIS 1:1 verification service. Templates live IN MEMORY only —
  # stopping this container erases all enrolled fingerprints (testing cache).
  matcher:
    build: ./matcher
    container_name: sakti-matcher
    ports:
      - "8090:8090"
    environment:
      - MATCHER_PORT=8090
      - MATCH_THRESHOLD=40
      # CS9711 68x118 frames need a low DPI so SourceAFIS extracts minutiae
      # (500 → 0 minutiae; ~150 works). Calibrate on hardware.
      - SENSOR_DPI=150
    restart: unless-stopped
